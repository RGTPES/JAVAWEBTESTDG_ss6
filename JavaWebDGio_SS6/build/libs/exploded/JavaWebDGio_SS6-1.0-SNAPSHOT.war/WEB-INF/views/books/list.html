<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sách</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
          crossorigin="anonymous">

    <style>
        .book-list-box {
            max-width: 1000px;
            margin: 40px auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 24px;
            background-color: #fff;
        }

        .book-list-title {
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .table thead th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div th:replace="fragments/header :: header('Trang danh sách sách')"></div>

<div class="container">
    <div class="book-list-box">
        <h2 class="book-list-title">Danh sách sách</h2>

        <div th:if="${books == null or #lists.isEmpty(books)}" class="empty-message">
            Không có dữ liệu sách.
        </div>

        <table class="table table-bordered" th:if="${books != null and !#lists.isEmpty(books)}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên sách</th>
                <th>Tác giả</th>
                <th>Thể loại</th>
                <th>Giá</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}"></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.category}"></td>
                <td th:text="${book.price}"></td>
                <td>
                    <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-outline-dark btn-sm">
                        Xem chi tiết
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
