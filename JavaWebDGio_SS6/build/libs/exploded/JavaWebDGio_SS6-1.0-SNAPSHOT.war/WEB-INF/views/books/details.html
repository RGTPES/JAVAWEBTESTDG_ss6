<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Chi tiết sách</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
        crossorigin="anonymous">
  <style>
    .book-detail-box {
      max-width: 700px;
      margin: 40px auto;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 24px;
      background-color: #fff;
    }
    .book-detail-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }
    .book-detail-item {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .book-detail-item:last-child {
      border-bottom: none;
    }
    .book-label {
      font-weight: bold;
      display: inline-block;
      min-width: 140px;
    }
  </style>
</head>
<body>
<div th:replace="fragments/header :: header('Trang chi tiết sách')"></div>
<div class="container">
  <div class="book-detail-box">
    <div th:if="${book != null}">
      <h2 class="book-detail-title">Chi tiết sách</h2>
      <div class="book-detail-item">
        <span class="book-label">ID:</span>
        <span th:text="${book.id}"></span>
      </div>
      <div class="book-detail-item">
        <span class="book-label">Tên sách:</span>
        <span th:text="${book.title}"></span>
      </div>
      <div class="book-detail-item">
        <span class="book-label">Tác giả:</span>
        <span th:text="${book.author}"></span>
      </div>

      <div class="book-detail-item">
        <span class="book-label">Thể loại:</span>
        <span th:text="${book.category}"></span>
      </div>

      <div class="book-detail-item">
        <span class="book-label">Giá:</span>
        <span th:text="${book.price}"></span>
      </div>

      <div class="book-detail-item">
        <span class="book-label">Nhà xuất bản:</span>
        <span th:text="${book.publisher}"></span>
      </div>

      <div class="book-detail-item">
        <span class="book-label">Năm xuất bản:</span>
        <span th:text="${book.year}"></span>
      </div>

      <div class="book-detail-item">
        <span class="book-label">Mô tả:</span>
        <span th:text="${book.description}"></span>
      </div>

      <a th:href="@{/books}" class="btn btn-outline-dark back-btn">Quay lại danh sách</a>
    </div>

    <div th:if="${book == null}" class="not-found">
      <h2>Chi tiết sách</h2>
      <p>Không tìm thấy sách.</p>
      <a th:href="@{/books}" class="btn btn-outline-dark back-btn">Quay lại danh sách</a>
    </div>

  </div>
</div>

<div th:replace="fragments/footer :: footer"></div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
